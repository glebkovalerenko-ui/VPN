name: ${PROJECT_NAME:-proxy-mvp}

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  environment:
    TZ: ${TZ}
    POSTGRES_HOST: db
    DATABASE_URL: ""
    PUBLISH_AUTH_MODE: ${PUBLISH_AUTH_MODE:-auto}
    GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    GH_TOKEN: ${GH_TOKEN:-}
    GIT_SSH_COMMAND: ${GIT_SSH_COMMAND:-}
  working_dir: /app
  volumes:
    - output_data:/app/output
  restart: unless-stopped

services:
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  db-init:
    <<: *app-common
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    command:
      - sh
      - -lc
      - |
        alembic -c alembic.ini upgrade head
        PGPASSWORD="$$POSTGRES_PASSWORD" psql \
          -v ON_ERROR_STOP=1 \
          -h "$$POSTGRES_HOST" \
          -p "$$POSTGRES_PORT" \
          -U "$$POSTGRES_USER" \
          -d "$$POSTGRES_DB" \
          -f sql/seeds/001_sources.sql

  pipeline-runner:
    <<: *app-common
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    command: ["python", "-m", "app.orchestrator.main"]

  api:
    <<: *app-common
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  output_data:
